version: "3.8"

services:
  karb-bot:
    build: .
    container_name: karb-bot
    restart: unless-stopped
    command: ["run", "--live", "--realtime"]
    env_file:
      - .env
    volumes:
      - karb-data:/root/.karb

  karb-dashboard:
    build: .
    container_name: karb-dashboard
    restart: unless-stopped
    command: ["dashboard", "--host", "0.0.0.0", "--port", "8080"]
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - karb-data:/root/.karb

volumes:
  karb-data:
    name: karb-data
